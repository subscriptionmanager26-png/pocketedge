name: Remediate basket conids

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (no writes)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  remediate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Remediate basket conids
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=()
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          node scripts/remediate-basket-conids.mjs "${ARGS[@]}"
