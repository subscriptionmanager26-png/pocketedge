name: Universe price fetch

on:
  schedule:
    # Daily — 12:30 AM UTC (us_close) and 12:30 PM UTC (overnight)
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Fetch slot (auto-detect if empty)'
        required: false
        type: choice
        options:
          - ''
          - overnight
          - us_close
      limit:
        description: 'Max instruments (empty = full universe)'
        required: false
        type: string

concurrency:
  group: universe-price-fetch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve fetch slot
        id: slot
        run: |
          INPUT="${{ github.event.inputs.slot }}"
          if [ -n "$INPUT" ]; then
            echo "value=$INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            H=$(date -u +%H)
            if [ "$H" -lt 6 ]; then
              echo "value=us_close" >> "$GITHUB_OUTPUT"
            else
              echo "value=overnight" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi
          echo "value=" >> "$GITHUB_OUTPUT"

      - name: Run universe price fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=()
          SLOT="${{ steps.slot.outputs.value }}"
          if [ -n "$SLOT" ]; then
            ARGS+=(--slot="$SLOT")
          fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS+=(--limit="${{ github.event.inputs.limit }}")
          fi
          node scripts/run-universe-price-fetch.mjs "${ARGS[@]}"
