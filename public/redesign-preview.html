<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketEdge - Global Markets</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000; /* Deep black */
            color: #fff;
            margin: 0;
            overflow-x: hidden; /* Prevent horizontal scroll */
            overflow-y: auto; /* Allow vertical scrolling */
            -webkit-font-smoothing: antialiased;
        }

        /* 3D Canvas Background */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: auto;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        /* Container for the UI Overlay */
        .ui-layer {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none; /* Let clicks pass through to globe where there's no UI */
        }

        /* Re-enable pointer events for specific UI elements */
        .interactive-ui {
            pointer-events: auto;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .logo-sup {
            font-size: 0.85rem;
            vertical-align: super;
            margin-left: 2px;
        }

        .hero-title {
            font-size: 4.5rem;
            line-height: 1.1;
            font-weight: 600;
            letter-spacing: -1.5px;
            color: #ffffff;
            margin-bottom: 1.5rem;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: #a0a0a0; /* Soft silver/gray */
            line-height: 1.6;
            font-weight: 400;
        }

        .feature-text {
            font-size: 0.85rem;
            color: #888;
            font-weight: 400;
            line-height: 1.4;
        }

        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        /* Dynamic 3D City Labels */
        .city-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.85); /* Slightly softer to handle the density */
            font-size: 9px; /* Smaller font to fit 50+ countries elegantly */
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            transform: translate(12px, -50%); /* Offset slightly to the right of the dot */
            text-transform: uppercase;
            transition: opacity 0.2s ease;
            z-index: 5;
            display: flex;
            align-items: center;
            text-shadow: 0 0 4px rgba(0,0,0,0.9);
        }
        
        /* Small glowing dot mapped exactly to coordinates */
        .city-label::before {
            content: '';
            position: absolute;
            left: -14px;
            display: block;
            width: 3px;
            height: 3px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 6px 1px rgba(255,255,255,0.9); /* Softer bloom for high density */
        }

        @media (max-width: 1024px) {
            .hero-title { font-size: 3.5rem; }
        }
        @media (max-width: 768px) {
            #canvas-container {
                pointer-events: none; /* Make globe non-interactive on mobile to allow page scrolling */
            }
            .hero-title { font-size: 2.5rem; margin-top: 5vh; margin-bottom: 1rem; letter-spacing: -1px; }
            .hero-subtitle { font-size: 1rem; line-height: 1.4; }
            .ui-layer { padding-left: 1.5rem !important; padding-right: 1.5rem !important; padding-top: 6rem !important; }
            /* Hide the large vertical dividers on mobile to save space */
            .mobile-divider { height: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Three.js Canvas Container -->
    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <!-- Top Navigation Bar -->
    <nav class="absolute top-0 left-0 w-full px-6 md:px-16 lg:px-32 py-6 md:py-8 flex justify-between items-center z-50 pointer-events-auto">
        <!-- Logo -->
        <div class="flex items-center gap-3 md:gap-4 cursor-pointer">
            <div class="flex items-center text-white">
                <span class="text-2xl md:text-3xl font-medium tracking-tighter">p<sup class="logo-sup">e</sup></span>
            </div>
            <div class="h-5 md:h-6 w-px bg-gray-700"></div>
            <span class="text-base md:text-lg font-medium text-gray-200 tracking-wide">PocketEdge</span>
        </div>
        
        <!-- Desktop Nav Links -->
        <div class="hidden md:flex gap-8 text-sm text-gray-400 font-medium items-center">
            <a href="#" class="hover:text-white transition-colors duration-200">Portfolios</a>
            <a href="#" class="hover:text-white transition-colors duration-200">Markets</a>
            <a href="#" class="hover:text-white transition-colors duration-200">Community</a>
            <button class="bg-transparent border border-gray-600 hover:border-white text-white px-6 py-2 rounded-full transition-all duration-200">Log In</button>
        </div>
        
        <!-- Mobile Menu Icon -->
        <div class="md:hidden text-white text-2xl cursor-pointer">
            <i class="ph-thin ph-list"></i>
        </div>
    </nav>

    <!-- UI Overlay -->
    <div class="ui-layer pl-6 md:pl-24 lg:pl-32 pb-12 md:pb-16 pt-24 md:pt-32">
        
        <!-- Main Content -->
        <main class="interactive-ui max-w-2xl mt-auto md:mt-20 z-10 pointer-events-none">
            <h1 class="hero-title">
                Discover Global<br>
                Investment Portfolios.
            </h1>
            
            <!-- Call to Action -->
            <div class="pointer-events-auto mt-8 md:mt-10">
                <button class="bg-white text-black px-8 py-3.5 rounded-full font-semibold text-sm hover:bg-gray-200 transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:shadow-[0_0_30px_rgba(255,255,255,0.4)]">
                    Get Started
                </button>
            </div>
        </main>

        <!-- Bottom Features -->
        <footer class="interactive-ui flex justify-between md:justify-start gap-2 md:gap-16 mt-auto pb-4 md:pb-8 w-full md:w-auto pr-4 md:pr-0">
            <!-- Feature 1 -->
            <div class="flex flex-col gap-2 md:gap-3">
                <i class="ph-thin ph-globe-hemisphere-west text-2xl md:text-3xl text-gray-400"></i>
                <span class="feature-text text-[10px] md:text-[0.85rem]">Global<br>Opportunities</span>
            </div>
            
            <div class="w-px h-10 md:h-16 bg-gray-800 mobile-divider"></div>
            
            <!-- Feature 2 -->
            <div class="flex flex-col gap-2 md:gap-3">
                <i class="ph-thin ph-users-three text-2xl md:text-3xl text-gray-400"></i>
                <span class="feature-text text-[10px] md:text-[0.85rem]">Community<br>Portfolios</span>
            </div>

            <div class="w-px h-10 md:h-16 bg-gray-800 mobile-divider"></div>
            
            <!-- Feature 3 -->
            <div class="flex flex-col gap-2 md:gap-3">
                <i class="ph-thin ph-target text-2xl md:text-3xl text-gray-400"></i>
                <span class="feature-text text-[10px] md:text-[0.85rem]">Smarter<br>Investing</span>
            </div>
        </footer>
    </div>

    <script>
        window.onload = function () {
            init3DEnvironment();
        };

        function init3DEnvironment() {
            const container = document.getElementById('canvas-container');
            const labelsContainer = document.getElementById('labels-container');
            
            const scene = new THREE.Scene();
            
            const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 28;
            
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const GLOBE_RADIUS = 10;
            const sceneGroup = new THREE.Group();
            scene.add(sceneGroup);

            // Function to handle responsive globe positioning
            function updateGlobePosition() {
                if (window.innerWidth < 768) {
                    // Mobile: Globe forms a "floor" at the bottom of the screen
                    sceneGroup.position.x = 0;
                    sceneGroup.position.y = -10.5;
                    sceneGroup.rotation.x = 0.2; // Tilt up slightly
                    sceneGroup.rotation.y = 1.0; 
                } else {
                    // Desktop: Globe is on the right side
                    sceneGroup.position.x = 9.5;
                    sceneGroup.position.y = -2.0;
                    sceneGroup.rotation.x = 0.35; 
                    sceneGroup.rotation.y = 1.37;
                }
            }

            // Set initial position
            updateGlobePosition();

            // 1. The Main Earth Globe (Unlit Shader for pitch black oceans & intense lights)
            const earthMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    tMap: { value: null }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vViewPosition = -mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tMap;
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    
                    void main() {
                        vec4 texColor = texture2D(tMap, vUv);
                        
                        // Grayscale conversion
                        float gray = dot(texColor.rgb, vec3(0.299, 0.587, 0.114));
                        
                        // Crush the darks completely to ensure oceans are 100% pure pitch black
                        // We extract landmasses slightly above the ocean noise floor to add contrast
                        float land = smoothstep(0.015, 0.15, gray) * 0.25; 
                        
                        // Exponentially boost city lights for a sharp glowing effect
                        float lights = pow(max(gray, 0.0), 3.0) * 8.0;

                        // Calculate dynamic rim light for a sharp white edge around the globe outline
                        vec3 viewDir = normalize(vViewPosition);
                        float rim = 1.0 - max(dot(viewDir, vNormal), 0.0);
                        
                        // Crisp white outline
                        float globeOutline = smoothstep(0.68, 0.9, rim) * 0.7; 

                        // Final color: pure absolute black oceans + charcoal land + bright lights + white rim
                        vec3 finalColor = vec3(0.0) + vec3(land) + vec3(1.0) * lights + vec3(1.0) * globeOutline;
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });

            // Load NASA's Earth at night texture
            const textureLoader = new THREE.TextureLoader();
            textureLoader.crossOrigin = 'Anonymous';
            textureLoader.load(
                'https://unpkg.com/three-globe/example/img/earth-night.jpg',
                function(texture) {
                    earthMaterial.uniforms.tMap.value = texture;
                    earthMaterial.needsUpdate = true;
                },
                undefined,
                function(err) {
                    console.warn('Map texture failed to load.');
                }
            );

            const earthSphere = new THREE.Mesh(new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64), earthMaterial);
            sceneGroup.add(earthSphere);

            // 2. City Data & Accurate Coordinates (50+ Major Financial Hubs / Countries)
            const citiesData = [
                // North America
                { name: "NEW YORK", lat: 40.7128, lon: -74.0060 },
                { name: "TORONTO", lat: 43.6510, lon: -79.3470 },
                { name: "MEXICO CITY", lat: 19.4326, lon: -99.1332 },
                
                // South America
                { name: "SÃO PAULO", lat: -23.5505, lon: -46.6333 },
                { name: "BUENOS AIRES", lat: -34.6037, lon: -58.3816 },
                { name: "SANTIAGO", lat: -33.4489, lon: -70.6693 },
                { name: "BOGOTA", lat: 4.7110, lon: -74.0721 },
                
                // Europe
                { name: "LONDON", lat: 51.5074, lon: -0.1278 },
                { name: "PARIS", lat: 48.8566, lon: 2.3522 },
                { name: "FRANKFURT", lat: 50.1109, lon: 8.6821 },
                { name: "ZURICH", lat: 47.3769, lon: 8.5417 },
                { name: "MILAN", lat: 45.4642, lon: 9.1900 },
                { name: "MADRID", lat: 40.4168, lon: -3.7038 },
                { name: "AMSTERDAM", lat: 52.3676, lon: 4.9041 },
                { name: "STOCKHOLM", lat: 59.3293, lon: 18.0686 },
                { name: "OSLO", lat: 59.9139, lon: 10.7522 },
                { name: "COPENHAGEN", lat: 55.6761, lon: 12.5683 },
                { name: "HELSINKI", lat: 60.1695, lon: 24.9354 },
                { name: "WARSAW", lat: 52.2297, lon: 21.0122 },
                { name: "VIENNA", lat: 48.2082, lon: 16.3738 },
                { name: "DUBLIN", lat: 53.3498, lon: -6.2603 },
                { name: "LISBON", lat: 38.7223, lon: -9.1393 },
                { name: "ATHENS", lat: 37.9838, lon: 23.7275 },
                { name: "ISTANBUL", lat: 41.0082, lon: 28.9784 },
                
                // Africa
                { name: "JOHANNESBURG", lat: -26.2041, lon: 28.0473 },
                { name: "LAGOS", lat: 6.5244, lon: 3.3792 },
                { name: "NAIROBI", lat: -1.2921, lon: 36.8219 },
                { name: "CAIRO", lat: 30.0444, lon: 31.2357 },
                { name: "CASABLANCA", lat: 33.5731, lon: -7.5898 },
                
                // Middle East
                { name: "DUBAI", lat: 25.2048, lon: 55.2708 },
                { name: "RIYADH", lat: 24.7136, lon: 46.6753 },
                { name: "TEL AVIV", lat: 32.0853, lon: 34.7818 },
                { name: "DOHA", lat: 25.2854, lon: 51.5310 },
                
                // Asia
                { name: "MUMBAI", lat: 19.0760, lon: 72.8777 },
                { name: "SINGAPORE", lat: 1.3521, lon: 103.8198 },
                { name: "HONG KONG", lat: 22.3193, lon: 114.1694 },
                { name: "SHANGHAI", lat: 31.2304, lon: 121.4737 },
                { name: "TOKYO", lat: 35.6762, lon: 139.6503 },
                { name: "SEOUL", lat: 37.5665, lon: 126.9780 },
                { name: "TAIPEI", lat: 25.0330, lon: 121.5654 },
                { name: "JAKARTA", lat: -6.2088, lon: 106.8456 },
                { name: "KUALA LUMPUR", lat: 3.1390, lon: 101.6869 },
                { name: "BANGKOK", lat: 13.7563, lon: 100.5018 },
                { name: "MANILA", lat: 14.5995, lon: 120.9842 },
                { name: "HO CHI MINH CITY", lat: 10.8231, lon: 106.6297 },
                { name: "DHAKA", lat: 23.8103, lon: 90.4125 },
                { name: "KARACHI", lat: 24.8607, lon: 67.0011 },
                { name: "COLOMBO", lat: 6.9271, lon: 79.8612 },
                
                // Oceania
                { name: "SYDNEY", lat: -33.8688, lon: 151.2093 },
                { name: "AUCKLAND", lat: -36.8485, lon: 174.7633 }
            ];

            const allNodes = [];
            const labeledNodes = [];

            // Correct mathematical conversion from Lat/Lon to Three.js SphereGeometry UV map
            function latLonToVector3(lat, lon, radius) {
                const phi = (90 - lat) * (Math.PI / 180);
                // The +180 offset perfectly aligns the mathematical nodes with the visual texture map
                const theta = (lon + 180) * (Math.PI / 180); 

                const x = -(radius * Math.sin(phi) * Math.cos(theta));
                const z = (radius * Math.sin(phi) * Math.sin(theta));
                const y = (radius * Math.cos(phi));

                return new THREE.Vector3(x, y, z);
            }

            const nodeGeometry = new THREE.SphereGeometry(0.04, 16, 16);
            const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

            // Plot Main Cities
            citiesData.forEach(city => {
                const position = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS + 0.01);
                
                const nodeMesh = new THREE.Mesh(nodeGeometry, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.0 }));
                nodeMesh.position.copy(position);
                sceneGroup.add(nodeMesh);

                const labelElement = document.createElement('div');
                labelElement.className = 'city-label';
                labelElement.textContent = city.name;
                labelsContainer.appendChild(labelElement);

                const nodeObj = { position: position, element: labelElement };
                allNodes.push(nodeObj);
                labeledNodes.push(nodeObj);
            });

            // Generate satellite/minor nodes for the network web
            for(let i=0; i<100; i++) {
                // Focus nodes around landmasses
                const lat = (Math.random() - 0.2) * 120;
                const lon = (Math.random() - 0.5) * 360;
                const position = latLonToVector3(lat, lon, GLOBE_RADIUS + 0.01);
                allNodes.push({ position: position });
                
                const minorMesh = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), nodeMaterial);
                minorMesh.position.copy(position);
                sceneGroup.add(minorMesh);
            }

            // Hairline, elegant arcs connecting the network
            const arcMaterial = new THREE.LineBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.12, 
                blending: THREE.AdditiveBlending
            });

            function createArc(start, end, heightMultiplier) {
                const distance = start.distanceTo(end);
                if(distance === 0) return; // Prevent curve errors
                
                const midPoint = start.clone().lerp(end, 0.5);
                // Create sweeping orbital arcs by pushing the midpoint outward
                midPoint.normalize().multiplyScalar(GLOBE_RADIUS + distance * heightMultiplier);
                
                const curve = new THREE.QuadraticBezierCurve3(start, midPoint, end);
                const points = curve.getPoints(50); // Smoother curves
                const curveGeometry = new THREE.BufferGeometry().setFromPoints(points);
                
                const line = new THREE.Line(curveGeometry, arcMaterial);
                sceneGroup.add(line);
            }

            // A: Connect all main cities to each other
            for(let i=0; i<labeledNodes.length; i++) {
                for(let j=i+1; j<labeledNodes.length; j++) {
                    // With 50 cities, drawing 1,225 arcs would clutter the screen. 
                    // We probabilistically draw arcs to maintain an elegant, readable network density.
                    if (Math.random() > 0.82) { 
                        createArc(labeledNodes[i].position, labeledNodes[j].position, 0.25);
                    }
                }
            }

            // B: Connect satellites to nearest main hubs
            allNodes.forEach((node, i) => {
                if(i >= labeledNodes.length) { 
                    let closestHub = null;
                    let minDistance = Infinity;
                    
                    labeledNodes.forEach(hub => {
                        const dist = node.position.distanceTo(hub.position);
                        if(dist < minDistance) {
                            minDistance = dist;
                            closestHub = hub;
                        }
                    });
                    
                    if(closestHub && Math.random() > 0.4) {
                        createArc(node.position, closestHub.position, 0.15);
                    }
                    
                    if(Math.random() > 0.85) {
                        const randomTarget = allNodes[Math.floor(Math.random() * allNodes.length)];
                        if(randomTarget !== node && node.position.distanceTo(randomTarget.position) < GLOBE_RADIUS * 1.2) {
                            createArc(node.position, randomTarget.position, 0.1);
                        }
                    }
                }
            });

            // Add subtle floating particles/stars in the background
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 200;
            const posArray = new Float32Array(particlesCount * 3);
            
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 50;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.05,
                color: 0xffffff,
                transparent: true,
                opacity: 0.3,
                blending: THREE.AdditiveBlending
            });
            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };
            
            container.addEventListener('mousedown', () => { isDragging = true; });
            container.addEventListener('mouseup', () => { isDragging = false; });
            container.addEventListener('mouseleave', () => { isDragging = false; });
            container.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.offsetX - previousMousePosition.x;
                    const deltaY = e.offsetY - previousMousePosition.y;
                    sceneGroup.rotation.y += deltaX * 0.005;
                    sceneGroup.rotation.x += deltaY * 0.005;
                }
                previousMousePosition = { x: e.offsetX, y: e.offsetY };
            });

            container.addEventListener('touchstart', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });
            container.addEventListener('touchend', () => { isDragging = false; });
            container.addEventListener('touchmove', (e) => {
                if (isDragging) {
                    const deltaX = e.touches[0].clientX - previousMousePosition.x;
                    const deltaY = e.touches[0].clientY - previousMousePosition.y;
                    sceneGroup.rotation.y += deltaX * 0.005;
                    sceneGroup.rotation.x += deltaY * 0.005;
                }
                previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            });

            function updateLabels() {
                const vector = new THREE.Vector3();
                labeledNodes.forEach(node => {
                    vector.copy(node.position);
                    vector.applyMatrix4(sceneGroup.matrixWorld);
                    
                    const cameraToNode = vector.clone().sub(camera.position).normalize();
                    const normal = vector.clone().normalize(); 
                    
                    vector.project(camera);
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    
                    node.element.style.left = `${x}px`;
                    node.element.style.top = `${y}px`;

                    // Hide label when rotated to the dark side of the globe
                    if (cameraToNode.dot(normal) > -0.1) {
                        node.element.style.opacity = '0';
                    } else {
                        node.element.style.opacity = '1';
                    }
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                if (!isDragging) {
                    sceneGroup.rotation.y += 0.0003; // Slow ambient rotation for cinematic feel
                }
                
                particlesMesh.rotation.y -= 0.0001;

                renderer.render(scene, camera);
                updateLabels();
            }
            
            animate();

            // Handle responsive resizing
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                
                updateGlobePosition();
            });
        }
    </script>
</body>
</html>
